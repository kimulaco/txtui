name: test

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pin:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.53.6
      - run: aqua update-checksum --prune
      - run: aqua exec -- pinact run --check
        env:
          GITHUB_TOKEN: ${{ github.token }}

  test:
    needs: pin
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ensure package.json version is bumped for main PRs
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: pnpm exec tsx scripts/ci/check-package-version-bump.ts "${{ github.base_ref }}"
      - run: pnpm astro sync
      - run: pnpm run lint:secret
      - run: pnpm run fmt
      - run: pnpm run lint:knip
      - run: pnpm run lint:eslint
      - run: pnpm run typecheck
      - run: pnpm run test:cov
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
